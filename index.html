<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CertForge</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect x='3' y='3' width='18' height='18' rx='2' fill='%23f7f1e3'/%3E%3Crect x='3' y='1' width='18' height='5' rx='2.5' fill='%236b5d4a'/%3E%3Crect x='3' y='18' width='18' height='5' rx='2.5' fill='%236b5d4a'/%3E%3Cpath d='M9 10h6M9 13h4' stroke='%238b7355' stroke-width='1' stroke-linecap='round'/%3E%3Cpath d='M15 7l.7 1.8L17.5 9.5l-1.8.7L15 12l-.7-1.8L12.5 9.5l1.8-.7z' fill='%23c4a77d'/%3E%3Cpath d='M18 11l.5 1.2 1.2.5-1.2.5L18 14.4l-.5-1.2-1.2-.5 1.2-.5z' fill='%23c4a77d'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Link to Vite CSS -->
    <link rel="stylesheet" href="/src/style.css">
</head>

<body>

    <div class="top-bar">
        <!-- Removed onclick="exportPDF()" -->
        <button class="export-btn" id="exportBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="7 10 12 15 17 10" />
                <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            <span>Export PDF</span>
        </button>
        <div class="palette-picker">
            <button class="swatch active" data-palette="1" style="background: #d8d8d8;" title="Slate Grey"></button>
            <button class="swatch" data-palette="2" style="background: #e3dccb;" title="Classic Sepia"></button>
            <button class="swatch" data-palette="3" style="background: #d8e0d3;" title="Sage Green"></button>
            <button class="swatch" data-palette="4" style="background: #e6d4d6;" title="Dusty Rose"></button>
            <button class="swatch" data-palette="5" style="background: #d4d8e0;" title="Slate Blue"></button>
            <button class="swatch" data-palette="6" style="background: #dfd8e8;" title="Lavender Blush"></button>
            <button class="swatch" data-palette="7" style="background: #e5d6cc;" title="Terracotta"></button>
            <button class="swatch" data-palette="8" style="background: #cce0df;" title="Teal Mist"></button>
        </div>
        <div class="texture-toggle">
            <label class="switch">
                <input type="checkbox" id="textureCheck" checked>
                <span class="slider"></span>
            </label>
            <span id="regenTextureText" style="cursor: pointer; user-select: none;">Paper Texture</span>
        </div>
    </div>

    <div class="certificate" id="certificate">

        <!-- Subtle paper-grain noise layer -->
        <div class="paper-texture" id="paperTexture"></div>

        <div class="frame-outer"></div>
        <div class="frame-inner"></div>

        <div class="corner corner-tl">
            <div class="arch outer"></div>
            <div class="arch inner"></div>
            <div class="dot dot1"></div>
            <div class="dot dot2"></div>
        </div>
        <div class="corner corner-tr">
            <div class="arch outer"></div>
            <div class="arch inner"></div>
            <div class="dot dot1"></div>
            <div class="dot dot2"></div>
        </div>
        <div class="corner corner-bl">
            <div class="arch outer"></div>
            <div class="arch inner"></div>
            <div class="dot dot1"></div>
            <div class="dot dot2"></div>
        </div>
        <div class="corner corner-br">
            <div class="arch outer"></div>
            <div class="arch inner"></div>
            <div class="dot dot1"></div>
            <div class="dot dot2"></div>
        </div>

        <div class="certificate__inner">

            <header class="cert-header">
                <div class="ornament-top">
                    <div class="orn-line"></div>
                    <div class="orn-circle-outer">
                        <div class="orn-circle-inner"></div>
                    </div>
                    <div class="orn-line"></div>
                </div>
                <h1 contenteditable="true" spellcheck="false" data-placeholder="Fine Art Authenticity Certificate"></h1>
                <div class="header-divider">
                    <span class="line"></span>
                    <span class="diamond"></span>
                    <span class="line"></span>
                </div>
            </header>

            <main class="cert-body">

                <div class="info-top">
                    <p class="eyebrow" contenteditable="true" spellcheck="false" data-placeholder="This is to certify the authenticity of"></p>
                    <h2 class="painting-title" contenteditable="true" spellcheck="false" data-placeholder="Artwork name"></h2>
                    <p class="by-line"><span class="by-word">by </span><span class="artist" contenteditable="true" spellcheck="false" data-placeholder="Artist name"></span></p>
                </div>

                <div class="meta-container">
                    <dl class="meta-list" id="metaList">
                        <div class="meta-row">
                            <!-- Removed onclick -->
                            <button class="meta-delete-btn" data-action="delete-meta">×</button>
                            <dt contenteditable="true" spellcheck="false" data-placeholder="New detail"></dt>
                            <dd contenteditable="true" spellcheck="false" data-placeholder="enter value"></dd>
                        </div>
                        <div class="meta-row">
                            <button class="meta-delete-btn" data-action="delete-meta">×</button>
                            <dt contenteditable="true" spellcheck="false" data-placeholder="New detail"></dt>
                            <dd contenteditable="true" spellcheck="false" data-placeholder="enter value"></dd>
                        </div>
                        <div class="meta-row">
                            <button class="meta-delete-btn" data-action="delete-meta">×</button>
                            <dt contenteditable="true" spellcheck="false" data-placeholder="New detail"></dt>
                            <dd contenteditable="true" spellcheck="false" data-placeholder="enter value"></dd>
                        </div>
                    </dl>
                    <button class="meta-add-btn" id="metaAddBtn" data-action="add-meta">+ Add detail</button>
                </div>

                <div class="cert-bottom-left">
                    <div class="qr-block">
                        <div class="qr-wrap" id="qrWrap" data-action="open-qr">
                            <div id="qrcode"></div>
                        </div>
                        <span class="qr-label" contenteditable="true" spellcheck="false" data-placeholder="Social"></span>
                    </div>

                    <div class="signatures">
                        <div class="sign-field">
                            <div class="sign-line"></div>
                            <p class="sign-label" contenteditable="true" spellcheck="false" data-placeholder="Artist's signature"></p>
                        </div>
                        <div class="sign-field">
                            <div class="sign-line"></div>
                            <p class="sign-label" contenteditable="true" spellcheck="false" data-placeholder="Date signed"></p>
                        </div>
                    </div>
                </div>

                <div class="image-container">
                    <div class="image-frame empty" id="imageFrame">
                        <input type="file" id="fileInput" accept="image/*" hidden>
                        <span class="image-placeholder" id="imagePlaceholder">Click to add image</span>
                        <img alt="The certified painting" id="paintingImg" style="display: none;">
                        <div class="upload-overlay"></div>
                        <div class="image-loader" id="imageLoader">
                            <div class="spinner"></div>
                        </div>
                        <button class="clear-image-btn" id="clearImageBtn" data-action="clear-image" title="Remove image">×</button>
                    </div>
                    <p class="image-caption" id="imageCaption" contenteditable="true" spellcheck="false" data-placeholder="— The certified work —"></p>
                </div>

            </main>
        </div>
    </div>

    <div class="qr-modal-overlay" id="qrModalOverlay">
        <div class="qr-modal">
            <h3>Set QR Code Link</h3>
            <input type="text" id="qrUrlInput" placeholder="Enter full URL (https://...)">
            <div class="qr-modal-actions">
                <!-- Removed onclick -->
                <button class="qr-modal-btn btn-cancel" data-action="close-qr">Cancel</button>
                <button class="qr-modal-btn btn-save" data-action="save-qr">Save</button>
            </div>
        </div>
    </div>

    <a href="https://github.com/phlaster/CertForge" target="_blank" rel="noopener noreferrer" class="gh-btn" title="View Source on GitHub">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.418-1.305.762-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.467-2.38 1.235-3.22-.135-.302-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.4 3-.405 1.02.005 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.874.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
    </a>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
